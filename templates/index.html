<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Legal AI Chatbot</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">

        <!-- LEFT SECTION -->
    <!-- LEFT SECTION -->
<div class="header-left">

    <!-- BIG FLOATING LOGO -->
    <img src="{{ url_for('static',
         filename='logo.png') }}"
         class="main-logo"
         alt="Legal AI Logo">

    <!-- TITLE -->
    <div class="header-text">

        <h1>Legal AI Chatbot</h1>

        <span>Your AI Legal Assistant</span>

    </div>

</div>

        <!-- CLEAR BUTTON -->
        <a href="/clear">

            <button class="clear-btn">

                Clear Chat

            </button>

        </a>

    </div>

    <!-- CHAT AREA -->
    <div class="chat-box">

        {% for chat in chat_history %}

            <!-- USER MESSAGE -->
            <div class="user-message">

                {{ chat.user }}

            </div>

            <!-- BOT MESSAGE -->
            <div class="bot-message">

                {{ chat.bot|safe }}

            </div>

        {% endfor %}

    </div>

    <!-- TYPING INDICATOR -->
    <div id="typing-indicator">

        Bot is typing...

    </div>

    <!-- INPUT FORM -->
    <form method="POST"
          class="chat-form"
          onsubmit="showTyping()">

        <input type="text"
               name="query"
               placeholder="Ask your legal question here..."
               autocomplete="off"
               required>

        <button type="submit">

            Send

        </button>

    </form>

</div>

<script>

    // AUTO SCROLL TO BOTTOM
    const chatBox = document.querySelector('.chat-box');

    chatBox.scrollTop = chatBox.scrollHeight;

    // SHOW TYPING ANIMATION
    function showTyping(){

        document.getElementById(
            "typing-indicator"
        ).style.display = "block";
    }

</script>

</body>

</html>
